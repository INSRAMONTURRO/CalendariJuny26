name: Deploy React to GitHub Pages

on:
  push:
    branches: ["main"] # o "master" si la teva branca principal s'anomena així
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # canvia a 'yarn' o 'pnpm' si en fas servir un altre

      - name: Install dependencies
        run: npm ci # o yarn install / pnpm install

      - name: Build
        run: npm run build # o yarn build / pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist # ⚠️ Canvia a 'build' si fas servir Create React App (CRA)

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
